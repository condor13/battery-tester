<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battery Diagnostic Pro</title>
    <style>
        :root { --bg: #0b1e33; --card: #162e4a; --text: #ffffff; --accent: #3498db; --highlight: #00d1b2; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; line-height: 1.6; }
        .container { max-width: 800px; margin: auto; }
        .card { background: var(--card); padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px; border: 1px solid #2c3e50; }
        h1, h2 { color: var(--accent); margin-top: 0; border-bottom: 2px solid #2c3e50; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; color: #bdc3c7; }
        input, select { width: 100%; padding: 12px; background: #0b1e33; border: 1px solid #34495e; color: white; border-radius: 6px; box-sizing: border-box; margin-bottom: 15px; }
        button { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1.1em; }
        button:hover { background: #2980b9; }
        .result-box { background: #0b1e33; padding: 20px; border-radius: 8px; border-left: 6px solid var(--highlight); margin-top: 20px; }
        .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 1.2em; }
        .val { font-weight: bold; color: var(--highlight); }
        
        @media print {
            body { background: white; color: black; }
            .card { border: 2px solid black; box-shadow: none; background: white; color: black; }
            input, select, button { display: none; }
            .val { color: black; }
            h1, h2 { color: black; border-bottom: 2px solid black; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>BATTERY PERFORMANCE ANALYZER</h1>
    
    <div class="card">
        <h2>1. Test Parameters</h2>
        <div class="grid">
            <div>
                <label>Battery Configuration</label>
                <select id="series">
                    <option value="10">10s (36V Nominal)</option>
                    <option value="13" selected>13s (48V Nominal)</option>
                </select>
            </div>
            <div>
                <label>Factory Capacity (Ah)</label>
                <input type="number" id="factoryCap" value="17.5" step="0.1">
            </div>
            <div>
                <label>Start Resting Voltage (V)</label>
                <input type="number" id="vStart" step="0.01" placeholder="e.g. 53.11">
            </div>
            <div>
                <label>End Resting Voltage (V)</label>
                <input type="number" id="vEnd" step="0.01" placeholder="e.g. 50.60">
            </div>
        </div>
    </div>

    <div class="card">
        <h2>2. Load Data</h2>
        <div class="grid">
            <div>
                <label>Avg Amps During Test</label>
                <input type="number" id="avgAmps" step="0.01" placeholder="e.g. 7.34">
            </div>
            <div>
                <label>Test Duration (Minutes)</label>
                <input type="number" id="duration" value="25">
            </div>
        </div>
        <button onclick="calculate()">RUN DIAGNOSTIC</button>
    </div>

    <div id="results" class="card" style="display:none;">
        <h2>3. Calculated Results</h2>
        <div class="result-grid">
            <div>Capacity Consumed:</div><div class="val" id="resConsumed">--</div>
            <div>Est. Total Capacity:</div><div class="val" id="resTotal">--</div>
            <div>Health Percentage:</div><div class="val" id="resHealth">--</div>
            <div>SoC Drop:</div><div class="val" id="resDrop">--</div>
        </div>
        <div style="margin-top:20px;">
            <button style="background:#7f8c8d;" onclick="window.print()">PRINT REPORT (B&W)</button>
        </div>
    </div>
</div>

<script>
function getSoC(v, s) {
    const vCell = v / s;
    const vPts = [3.0, 3.3, 3.4, 3.5, 3.6, 3.7, 3.8, 3.9, 4.0, 4.1, 4.2];
    const sPts = [0, 6, 14, 25, 38, 51, 63, 74, 84, 91, 100];
    
    if (vCell <= 3.0) return 0;
    if (vCell >= 4.2) return 100;

    for (let i = 0; i < vPts.length - 1; i++) {
        if (vCell >= vPts[i] && vCell <= vPts[i+1]) {
            return sPts[i] + (vCell - vPts[i]) * (sPts[i+1] - sPts[i]) / (vPts[i+1] - vPts[i]);
        }
    }
    return 0;
}

function calculate() {
    const s = parseFloat(document.getElementById('series').value);
    const fCap = parseFloat(document.getElementById('factoryCap').value);
    const vStart = parseFloat(document.getElementById('vStart').value);
    const vEnd = parseFloat(document.getElementById('vEnd').value);
    const amps = parseFloat(document.getElementById('avgAmps').value);
    const mins = parseFloat(document.getElementById('duration').value);

    const socStart = getSoC(vStart, s);
    const socEnd = getSoC(vEnd, s);
    const socDrop = (socStart - socEnd) / 100;

    const consumed = amps * (mins / 60);
    const totalCap = consumed / socDrop;
    const health = (totalCap / fCap) * 100;

    document.getElementById('resConsumed').innerText = consumed.toFixed(3) + " Ah";
    document.getElementById('resTotal').innerText = totalCap.toFixed(2) + " Ah";
    document.getElementById('resHealth').innerText = Math.min(health, 100).toFixed(0) + "%";
    document.getElementById('resDrop').innerText = (socDrop * 100).toFixed(1) + "%";
    
    document.getElementById('results').style.display = 'block';
}
</script>
</body>
</html>
